<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Yash Poly Plast — ISO Document Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --white:#ffffff;--bg:#f8fafc;--bg2:#f1f5f9;
  --ink:#0f172a;--ink2:#475569;--ink3:#94a3b8;
  --border:#e2e8f0;--border2:#cbd5e1;
  --indigo:#4f46e5;--indigo2:#4338ca;--indigo-soft:#eef2ff;
  --teal:#0891b2;--green:#059669;--amber:#d97706;--rose:#be185d;
  --radius:8px;--mono:'JetBrains Mono',monospace;
  --shadow:0 1px 3px rgba(15,23,42,.06),0 1px 2px rgba(15,23,42,.04);
}
html{font-size:14px;scroll-behavior:smooth}
body{font-family:Inter,system-ui,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}

/* HEADER */
.hdr{background:var(--white);border-bottom:1px solid var(--border);padding:0 20px;position:sticky;top:0;z-index:200;box-shadow:var(--shadow)}
.hdr-inner{max-width:1280px;margin:0 auto;padding:14px 0;display:flex;align-items:center;justify-content:space-between;gap:12px}
.hdr-left{display:flex;align-items:center;gap:12px}
.hdr-logo{width:36px;height:36px;background:linear-gradient(135deg,var(--indigo),var(--teal));border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:.75rem;flex-shrink:0;letter-spacing:.05em}
.hdr-title{font-size:1rem;font-weight:700;color:var(--ink);letter-spacing:-.01em}
.hdr-sub{font-size:.7rem;color:var(--ink3);margin-top:2px}
.hdr-badges{display:flex;gap:5px;flex-wrap:wrap}
.hdr-badge{font-family:var(--mono);font-size:.6rem;background:var(--indigo-soft);color:var(--indigo2);border:1px solid #c7d2fe;border-radius:4px;padding:2px 7px;font-weight:500}

/* STATS */
.stats-bar{background:var(--white);border-bottom:1px solid var(--border);padding:0 20px}
.stats-inner{max-width:1280px;margin:0 auto;display:flex;overflow-x:auto}
.stat{flex:1;min-width:80px;padding:10px 16px;border-right:1px solid var(--border);text-align:center}
.stat:last-child{border-right:none}
.stat-n{font-family:var(--mono);font-size:1.3rem;font-weight:600;color:var(--indigo);display:block}
.stat-l{font-size:.62rem;color:var(--ink3);text-transform:uppercase;letter-spacing:.08em;margin-top:2px}

/* CHIPS */
.chips-bar{background:var(--bg);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;gap:6px;flex-wrap:wrap}
.chip{border:1.5px solid color-mix(in srgb,var(--cc) 30%,var(--border));background:var(--white);color:var(--cc);border-radius:6px;padding:4px 12px;font-size:.73rem;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;font-family:var(--mono)}
.chip.all{--cc:#64748b}
.chip.on{background:var(--cc);color:#fff;border-color:var(--cc)}
.chip:hover:not(.on){background:color-mix(in srgb,var(--cc) 8%,var(--white))}

/* TOOLBAR */
.toolbar{background:var(--white);border-bottom:1px solid var(--border);padding:10px 20px}
.toolbar-inner{max-width:1280px;margin:0 auto;display:flex;flex-direction:column;gap:8px}
.search-wrap{position:relative;flex:1}
.search-wrap input{
  width:100%;padding:9px 36px 9px 38px;
  background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius);
  font-size:.88rem;color:var(--ink);outline:none;font-family:inherit;
  transition:border-color .15s,box-shadow .15s;
}
.search-wrap input:focus{border-color:var(--indigo);box-shadow:0 0 0 3px rgba(79,70,229,.1)}
.search-wrap input::placeholder{color:var(--ink3)}
.search-ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--ink3);font-size:.9rem;pointer-events:none}
.search-x{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--ink3);font-size:.85rem;display:none;padding:2px}
.frow{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.frow select{
  padding:7px 12px;background:var(--bg);border:1.5px solid var(--border);
  border-radius:var(--radius);font-size:.8rem;color:var(--ink);cursor:pointer;
  outline:none;flex:1;min-width:130px;
}
.frow select:focus{border-color:var(--indigo)}
.sort-btn{padding:7px 14px;background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--radius);font-size:.78rem;color:var(--ink2);font-weight:500;cursor:pointer;white-space:nowrap}
.sort-btn:hover{border-color:var(--indigo);color:var(--indigo)}
.rst{padding:7px 14px;background:var(--indigo);color:#fff;border:none;border-radius:var(--radius);font-size:.78rem;font-weight:600;cursor:pointer}
.rst:hover{background:var(--indigo2)}

/* RESULT BAR */
.rbar{padding:7px 20px;background:var(--bg);border-bottom:1px solid var(--border)}
.rbar-inner{max-width:1280px;margin:0 auto;display:flex;justify-content:space-between}
.rbar-count{font-size:.73rem;color:var(--ink3);font-family:var(--mono)}
.rbar-active{font-size:.73rem;color:var(--indigo);font-weight:500}

/* MAIN */
.main{max-width:1280px;margin:0 auto;padding:16px 20px 48px}

/* CATEGORY SECTIONS */
.cat-section{margin-bottom:6px;background:var(--white);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.cat-header{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;cursor:pointer;user-select:none;transition:background .12s}
.cat-header:hover{background:var(--bg)}
.cat-header-left{display:flex;align-items:center;gap:10px}
.cat-icon{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:700;flex-shrink:0;font-family:var(--mono)}
.cat-name{font-size:.86rem;font-weight:600;color:var(--ink)}
.cat-count{font-family:var(--mono);font-size:.68rem;color:var(--ink3);background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:1px 7px}
.cat-chevron{color:var(--ink3);font-size:.7rem;transition:transform .2s}
.cat-section.open .cat-chevron{transform:rotate(180deg)}
.cat-body{display:none;border-top:1px solid var(--border)}
.cat-section.open .cat-body{display:block}

/* TABLE */
table{width:100%;border-collapse:collapse;font-size:.82rem}
thead th{
  background:var(--bg);color:var(--ink2);font-size:.65rem;font-weight:600;
  text-transform:uppercase;letter-spacing:.08em;padding:8px 14px;
  border-bottom:1px solid var(--border2);text-align:left;white-space:nowrap;cursor:pointer;
}
thead th:hover{color:var(--indigo)}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--indigo-soft)}
td{padding:9px 14px;vertical-align:middle}
td.code{font-family:var(--mono);font-size:.73rem;color:var(--ink3);white-space:nowrap}
td.title a{color:var(--ink);text-decoration:none;font-size:.84rem;font-weight:500}
td.title a:hover{color:var(--indigo)}
td.clause a{font-family:var(--mono);font-size:.72rem;color:var(--indigo);font-weight:600;text-decoration:none}
td.clause a:hover{text-decoration:underline}
.std-badge{display:inline-block;font-size:.62rem;font-weight:700;border-radius:4px;padding:2px 7px;color:#fff;font-family:var(--mono)}
.open-link{font-size:.74rem;color:var(--indigo);text-decoration:none;font-weight:600;white-space:nowrap}
.open-link:hover{color:var(--indigo2);text-decoration:underline}
.no-results{padding:48px;text-align:center;color:var(--ink3);font-size:.88rem}

/* QR CELL */
.qr-cell{width:60px;text-align:center;opacity:0;transition:opacity .15s}
.qr-cell img{width:52px;height:52px;border-radius:6px;border:1px solid var(--border2);cursor:pointer;display:block;margin:0 auto}
tbody tr:hover .qr-cell{opacity:1}

/* QR MODAL */
.qr-modal{display:none;position:fixed;inset:0;z-index:500;background:rgba(15,23,42,.55);backdrop-filter:blur(4px);align-items:center;justify-content:center}
.qr-modal.show{display:flex}
.qr-box{background:#fff;border-radius:16px;padding:28px;text-align:center;box-shadow:0 24px 48px rgba(15,23,42,.2);max-width:300px;width:90%}
.qr-box img{width:200px;height:200px;border-radius:8px;border:1px solid var(--border)}
.qr-code-label{font-family:var(--mono);font-size:.8rem;color:var(--ink3);margin-top:12px;font-weight:500}
.qr-title-label{font-size:.85rem;color:var(--ink);font-weight:600;margin-top:4px;line-height:1.35}
.qr-url{font-size:.68rem;color:var(--ink3);margin-top:8px;word-break:break-all}
.qr-close{margin-top:16px;padding:7px 20px;background:var(--indigo);color:#fff;border:none;border-radius:8px;font-size:.82rem;font-weight:600;cursor:pointer}
.qr-close:hover{background:var(--indigo2)}

/* DOC CARD (mobile) */
.doc-card{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;flex-direction:column;gap:6px}
.doc-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.doc-card-title{font-size:.88rem;font-weight:600;color:var(--ink);line-height:1.35;flex:1}
.doc-card-title a{color:inherit;text-decoration:none}
.doc-card-title a:hover{color:var(--indigo)}
.doc-card-qr img{width:56px;height:56px;border-radius:6px;border:1px solid var(--border2);flex-shrink:0;cursor:pointer}
.doc-card-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.doc-card-code{font-family:var(--mono);font-size:.68rem;color:var(--ink3)}
.doc-card-clause{font-family:var(--mono);font-size:.68rem;color:var(--indigo);font-weight:600}

@media(min-width:640px){
  .toolbar-inner{flex-direction:row;align-items:center}
  .search-wrap{min-width:260px}
  .frow{flex-wrap:nowrap}
  .doc-cards{display:none}
}
@media(max-width:639px){
  .hdr-badges{display:none}
  .hdr-inner{padding:10px 0;gap:8px}
  .hdr-title{font-size:.88rem}
  .stats-inner{gap:0}
  .stat{padding:8px 8px;min-width:55px}
  .stat-n{font-size:1.1rem}
  .chips-bar{padding:8px 12px}
  .toolbar{padding:8px 12px}
  .rbar{padding:5px 12px}
  .main{padding:10px 10px 48px}
  table{display:none}
  .doc-cards{display:block}
  .cat-header{padding:11px 14px}
  .cat-body{padding:8px 10px}
}
</style>
</head>

let std="", sortKey="code";
const SORT_KEYS=["code","title","standard","clause"];
let sortIdx=0;

function toggleSort(){
  sortIdx=(sortIdx+1)%SORT_KEYS.length;
  sortKey=SORT_KEYS[sortIdx];
  document.getElementById("sortLabel").textContent="Sort: "+sortKey.charAt(0).toUpperCase()+sortKey.slice(1);
  go();
}

document.querySelectorAll("#chips .chip").forEach(c=>c.onclick=function(){
  std=this.dataset.s;
  document.querySelectorAll("#chips .chip").forEach(x=>x.classList.remove("on"));
  this.classList.add("on");
  document.getElementById("rstd").textContent=std?std+" only":"";
  go();
});

function openQR(code,title,url){
  document.getElementById("qrImg").src="data:image/png;base64,"+QR[code];
  document.getElementById("qrCode").textContent=code;
  document.getElementById("qrTitle").textContent=title;
  document.getElementById("qrUrl").textContent=url;
  document.getElementById("qrModal").classList.add("show");
}
function closeQR(e){if(e.target===document.getElementById("qrModal"))document.getElementById("qrModal").classList.remove("show");}
function filterClause(c){document.getElementById("fcl").value=c;go();}
function clearQ(){document.getElementById("q").value="";document.getElementById("xbtn").style.display="none";go();}
function reset(){
  std="";sortIdx=0;sortKey="code";
  document.getElementById("sortLabel").textContent="Sort: Code";
  document.querySelectorAll("#chips .chip").forEach((c,i)=>c.classList.toggle("on",i===0));
  document.getElementById("q").value="";document.getElementById("fcl").value="";
  document.getElementById("xbtn").style.display="none";document.getElementById("rstd").textContent="";
  go();
}

function go(){
  const q=document.getElementById("q").value.toLowerCase().trim();
  const cl=document.getElementById("fcl").value;
  document.getElementById("xbtn").style.display=q?"block":"none";
  let r=D.filter(d=>
    (!std||d.standard===std)&&(!cl||d.clause===cl)&&
    (!q||(d.code.toLowerCase().includes(q)||d.title.toLowerCase().includes(q)||d.clause.includes(q)))
  );
  r.sort((a,b)=>{
    let av=a[sortKey]||"",bv=b[sortKey]||"";
    if(sortKey==="clause"){const np=x=>x.split(".").map(p=>isNaN(p)?p:p.padStart(4,"0")).join(".");av=np(av);bv=np(bv);}
    return av<bv?-1:av>bv?1:0;
  });

  document.getElementById("rbar").textContent=r.length+" document"+(r.length!==1?"s":"");
  document.getElementById("sn").textContent=r.length;

  const groups={};
  r.forEach(d=>{if(!groups[d.cat_label])groups[d.cat_label]=[];groups[d.cat_label].push(d);});

  const main=document.getElementById("main");
  if(!r.length){main.innerHTML='<div class="no-results">No documents match your filters.</div>';return;}

  main.innerHTML=Object.entries(groups).map(([cat,items])=>{
    const first=items[0];
    const rows=items.map(d=>`<tr>
      <td class="code">${d.code}</td>
      <td class="title"><a href="${d.url}" target="_blank">${d.title}</a></td>
      <td class="col-std">${d.standard?`<span class="std-badge" style="background:${STD_COLOR[d.standard]||"#6b7280"}">${d.standard}</span>`:""}</td>
      <td class="clause col-clause">${d.clause?`<a href="#" onclick="filterClause('${d.clause}');return false">§ ${d.clause}</a>`:"—"}</td>
      <td class="qr-cell">${QR[d.code]?`<img src="data:image/png;base64,${QR[d.code]}" alt="QR" onclick="openQR('${d.code}','${d.title.replace(/'/g,"\\'")}',${JSON.stringify(d.url)})">`:""}
      </td>
    </tr>`).join("");
    const cards=items.map(d=>`<div class="doc-card">
      <div class="doc-card-top">
        <div class="doc-card-title"><a href="${d.url}" target="_blank">${d.title}</a></div>
        ${QR[d.code]?`<div class="doc-card-qr"><img src="data:image/png;base64,${QR[d.code]}" alt="QR" onclick="openQR('${d.code}','${d.title.replace(/'/g,"\\'")}',${JSON.stringify(d.url)})"></div>`:""}
      </div>
      <div class="doc-card-meta">
        <span class="doc-card-code">${d.code}</span>
        ${d.standard?`<span class="std-badge" style="background:${STD_COLOR[d.standard]||"#6b7280"}">${d.standard}</span>`:""}
        ${d.clause?`<span class="doc-card-clause">§${d.clause}</span>`:""}
      </div>
    </div>`).join("");
    return `<div class="cat-section">
      <div class="cat-header" onclick="this.parentElement.classList.toggle('open')">
        <div class="cat-header-left">
          <div class="cat-icon" style="background:${CAT_BG[first.cat]||"#f8fafc"};color:${CAT_FG[first.cat]||"#475569"}">${first.cat}</div>
          <span class="cat-name">${cat}</span>
          <span class="cat-count">${items.length}</span>
        </div>
        <span class="cat-chevron">▼</span>
      </div>
      <div class="cat-body">
        <table>
          <thead><tr>
            <th>Code</th><th>Title</th>
            <th class="col-std">Standard</th>
            <th class="col-clause">Clause</th>
            <th></th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
        <div class="doc-cards">${cards}</div>
      </div>
    </div>`;
  }).join("");
}
go();
</script>
</body>
</html>
